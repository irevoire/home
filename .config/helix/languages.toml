[[language]]
name = "rust"

[language-server.rust-analyzer]
environment = { CARGO_TARGET_DIR = "target/analyzer" }

[language-server.rust-analyzer.config.check]
command = "clippy"

[language-server]
numbat-lsp = { command = "/Users/irevoire/numbat/target/debug/numbat-lsp" }
numbat-spellcheck = { command = "/Users/irevoire/astral-interview-project-rust/target/release/spell-check", args = ["/usr/share/dict/words", "--lsp", "--check-opening", "#", "--propose-fix" ] }

[[language]]
name = "numbat"
scope = "source.nbt"
roots = ["."]
file-types = ["nbt"]
comment-token = "#"
indent = { tab-width = 2, unit = "  " }
# language-servers = [ "numbat-lsp", "numbat-spellcheck" ]
language-servers = [ "numbat-lsp", "numbat-spellcheck" ]
# formatter = { command = "mylang-formatter" , args = ["--stdin"] }

[[grammar]]
name = "numbat"
source.path = "/Users/irevoire/tree-sitter-numbat"
